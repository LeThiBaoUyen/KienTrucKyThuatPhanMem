services:
  mysql:
    image: mysql:8.0
    container_name: bai08-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  node-app:
    build: ./app
    container_name: bai08-node-app
    environment:
      DB_HOST: mysql
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: mydb
    ports:
      - "3008:3000"
    depends_on:
      - mysql

volumes:
  mysql_data:
